# Capability Registry
# Each capability is a named composition of skills + optional behavioral directives.
# Agents reference capabilities; the enrichment pipeline resolves them to skills.

critical-analysis:
  skills:
    - skill-analysis-critical
    - skill-reasoning-logic
  directive: "Attack arguments, not people. Find enthymemes. First principles. Falsify. CoV for claims. Step-back for complex problems."

content-structure:
  skills:
    - skill-content-structure
    - skill-dense-summarization
  directive: "BLUF. Minto pyramid. MECE. Atomic paragraphs. 80/20 density."

